name: Processor Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-processor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    
      - name: Create dummy .env
        run: |
            touch .env
            echo "POSTGRES_DB=test_db" >> .env
            echo "POSTGRES_USER=user" >> .env
            echo "POSTGRES_PASSWORD=pass" >> .env
            echo "AWS_REGION_NAME=us-east-1" >> .env
            echo "AWS_STORAGE_BUCKET=dummy-bucket" >> .env
            echo "AWS_RAW_IMG_QUEUE_URL=https://sqs.dummy.url" >> .env
            echo "YOLO_SEG_MODEL_S3KEY=models/yolo_seg.pt" >> .env
            echo "YOLO_SEG_MODEL_LOCALPATH=/app/models/yolo_seg.pt" >> .env
            

      - name: Build and Run Tests
        run: |
          docker build -t processor-test .
          docker run --rm \
          --entrypoint "" \
          --env-file .env \
          processor-test python3 -m pytest tests -v
